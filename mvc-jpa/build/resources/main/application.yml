server:
  port: 8080

spring:
  application:
    name: mvc-jpa-mysql
  datasource:
    url: jdbc:mysql://localhost:13306/userdb?useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

app:
  simulate-delay-ms: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}
