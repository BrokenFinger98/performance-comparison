server:
  port: 8081

spring:
  application:
    name: webflux-r2dbc-mysql
  r2dbc:
    url: r2dbc:mysql://localhost:13306/userdb
    username: root
    password: root1234
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

app:
  simulate-delay-ms: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}
